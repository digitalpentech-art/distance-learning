{% extends "base.html" %}
{% block content %}
<h2 class="text-2xl mb-4">Add Topic</h2>
<form method="POST">
    <div class="mb-4">
        <label class="block">Topic Name</label>
        <input type="text" name="name" class="w-full border p-2" required>
    </div>
    <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Add</button>
</form>
{% endblock %}
