{% extends "base.html" %}

{% block title %}Add Quiz{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-lg mx-auto bg-white shadow-md rounded-lg overflow-hidden">
        <div class="px-6 py-4 bg-gray-100 border-b border-gray-200">
            <h2 class="text-xl font-bold text-gray-800">Add New Quiz</h2>
            <p class="text-sm text-gray-600">Course: {{ course.name }}</p>
        </div>

        <form method="POST" class="p-6 space-y-4">
            <div>
                <label for="title" class="block text-sm font-medium text-gray-700">Quiz Title</label>
                <input type="text" name="title" id="title" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                    placeholder="e.g., Mid-term Quiz on Neural Networks">
            </div>

            <div class="flex items-center justify-end space-x-4 pt-4">
                <a href="{{ url_for('course.view_course', course_id=course.id) }}" class="text-gray-600 hover:text-gray-800 font-medium">
                    Cancel
                </a>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition duration-300">
                    Create Quiz
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
