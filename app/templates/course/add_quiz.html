{% extends "base.html" %}
{% block content %}
<h2 class="text-2xl mb-4">Add Quiz</h2>
<form method="POST">
    <div class="mb-4">
        <label class="block">Quiz Title</label>
        <input type="text" name="title" class="w-full border p-2" required>
    </div>
    <button type="submit" class="bg-purple-500 text-white px-4 py-2 rounded">Add Quiz</button>
</form>
{% endblock %}
