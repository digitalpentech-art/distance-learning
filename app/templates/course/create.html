{% extends "base.html" %}
{% block content %}
<h2 class="text-2xl mb-4">Create Course</h2>
<form method="POST">
    <div class="mb-4">
        <label class="block">Course Name</label>
        <input type="text" name="name" class="w-full border p-2" required>
    </div>
    <div class="mb-4">
        <label class="block">Subject ID</label>
        <input type="number" name="subject_id" class="w-full border p-2" required>
    </div>
    <div class="mb-4">
        <label class="block">Semester ID</label>
        <input type="number" name="semester_id" class="w-full border p-2" required>
    </div>
    <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Create</button>
</form>
{% endblock %}
