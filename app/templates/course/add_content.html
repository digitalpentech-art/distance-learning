{% extends "base.html" %}
{% block content %}
<h2 class="text-2xl mb-4">Add Content</h2>
<form method="POST">
    <div class="mb-4">
        <label class="block">Title</label>
        <input type="text" name="title" class="w-full border p-2" required>
    </div>
    <div class="mb-4">
        <label class="block">Type</label>
        <select name="type" class="w-full border p-2">
            <option value="Note">Note</option>
            <option value="PDF">PDF</option>
            <option value="Video">Video</option>
        </select>
    </div>
    <div class="mb-4">
        <label class="block">URL/Path</label>
        <input type="text" name="url" class="w-full border p-2">
    </div>
    <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Add</button>
</form>
{% endblock %}
