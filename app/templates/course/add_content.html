{% extends "base.html" %}

{% block title %}Add Content{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-lg mx-auto bg-white shadow-md rounded-lg overflow-hidden">
        <div class="px-6 py-4 bg-gray-100 border-b border-gray-200">
            <h2 class="text-xl font-bold text-gray-800">Add Content</h2>
            <p class="text-sm text-gray-600">Lesson: {{ lesson.name }}</p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="p-6 space-y-4">
            <div>
                <label for="title" class="block text-sm font-medium text-gray-700">Content Title</label>
                <input type="text" name="title" id="title" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                    placeholder="e.g., Lecture Notes on Neural Networks">
            </div>

            <div>
                <label for="type" class="block text-sm font-medium text-gray-700">Content Type</label>
                <select name="type" id="type" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    <option value="note">Text Note</option>
                    <option value="pdf">PDF</option>
                    <option value="video">Video</option>
                    <option value="audio">Audio</option>
                    <option value="image">Image</option>
                    <option value="external">External Link</option>
                </select>
            </div>

            <div class="border-t border-gray-200 pt-4">
                <p class="text-sm font-medium text-gray-700 mb-2">Upload File</p>
                <input type="file" name="file" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>

            <div class="border-t border-gray-200 pt-4">
                <p class="text-sm font-medium text-gray-700 mb-2">Or Provide URL</p>
                <input type="url" name="url" id="url" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" placeholder="https://example.com/resource">
            </div>

            <div class="flex items-center justify-end space-x-4 pt-4">
                <a href="{{ url_for('course.view_course', course_id=lesson.topic.course_id) }}" class="text-gray-600 hover:text-gray-800 font-medium">
                    Cancel
                </a>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition duration-300">
                    Add Content
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
