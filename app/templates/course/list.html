{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl mb-4">Courses</h1>
<a href="{{ url_for('course.create_course') }}" class="bg-blue-500 text-white px-4 py-2 rounded">Create Course</a>
<ul class="mt-4">
    {% for course in courses %}
    <li class="p-2 border-b">
        <a href="{{ url_for('course.view_course', course_id=course.id) }}" class="text-blue-600">{{ course.name }}</a>
    </li>
    {% endfor %}
</ul>
{% endblock %}
