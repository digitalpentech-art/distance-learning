{% extends "base.html" %}
{% block header %}Login{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
    {% call comp.card() %}
        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" name="username" class="mt-1 block w-full border border-gray-300 rounded-lg p-2 focus:ring-indigo-500 focus:border-indigo-500" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" name="password" class="mt-1 block w-full border border-gray-300 rounded-lg p-2 focus:ring-indigo-500 focus:border-indigo-500" required>
            </div>
            <div class="pt-2">
                {{ comp.btn(text='Login', variant='primary', type='button') }}
            </div>
        </form>
    {% endcall %}
</div>
{% endblock %}
