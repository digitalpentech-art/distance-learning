{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
    <h2 class="text-2xl mb-4">Register</h2>
    <form method="POST">
        <div class="mb-4">
            <label class="block">Username</label>
            <input type="text" name="username" class="w-full border p-2" required>
        </div>
        <div class="mb-4">
            <label class="block">Email</label>
            <input type="email" name="email" class="w-full border p-2" required>
        </div>
        <div class="mb-4">
            <label class="block">Password</label>
            <input type="password" name="password" class="w-full border p-2" required>
        </div>
        <div class="mb-4">
            <label class="block">Role</label>
            <select name="role" class="w-full border p-2">
                <option value="student">Student</option>
                <option value="lecturer">Lecturer</option>
                <option value="admin">Admin</option>
            </select>
        </div>
        <button type="submit" class="bg-green-500 text-white px-4 py-2 rounded">Register</button>
    </form>
</div>
{% endblock %}
