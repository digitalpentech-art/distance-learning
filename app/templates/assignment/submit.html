{% extends "base.html" %}

{% block title %}Submit Assignment{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-lg mx-auto bg-white shadow-md rounded-lg overflow-hidden">
        <div class="px-6 py-4 bg-gray-100 border-b border-gray-200">
            <h2 class="text-xl font-bold text-gray-800">Submit Assignment</h2>
            <p class="text-sm text-gray-600">{{ assignment.title }}</p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="p-6 space-y-4">
            <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-4">
                <p class="text-sm text-yellow-700">
                    <strong>Due Date:</strong> {{ assignment.due_date.strftime('%Y-%m-%d %H:%M') }}
                </p>
            </div>

            <div>
                <label for="file" class="block text-sm font-medium text-gray-700">Upload Your Work</label>
                <input type="file" name="file" id="file" required
                    class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                <p class="mt-1 text-xs text-gray-500">Supported formats: PDF, DOCX, ZIP, Image, etc.</p>
            </div>

            <div class="flex items-center justify-end space-x-4 pt-4">
                <a href="{{ url_for('course.view_course', course_id=assignment.course_id) }}" class="text-gray-600 hover:text-gray-800 font-medium">
                    Cancel
                </a>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition duration-300">
                    Submit Assignment
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
