{% extends "base.html" %}
{% block header %}Student Dashboard{% endblock %}
{% block content %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        {% call comp.card(title='Average Score') %}
            <p class="text-4xl font-bold" id="avg-score">Loading...</p>
        {% endcall %}
        {% call comp.card(title='Courses Completed') %}
            <p class="text-4xl font-bold" id="comp-courses">Loading...</p>
        {% endcall %}
    </div>

<script>
    fetch('/analytics/dashboard')
        .then(response => response.json())
        .then(data => {
            document.getElementById('avg-score').innerText = data.average_score + '%';
            document.getElementById('comp-courses').innerText = data.completed_courses;
        });
</script>
{% endblock %}
