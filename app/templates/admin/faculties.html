{% extends "base.html" %}
{% block content %}
<h2>Manage Faculties</h2>
<form method="POST">
    <input type="text" name="name" placeholder="Faculty Name" required>
    <button type="submit">Add Faculty</button>
</form>
<ul>
    {% for faculty in faculties %}
    <li>{{ faculty.name }}</li>
    {% endfor %}
</ul>
{% endblock %}
