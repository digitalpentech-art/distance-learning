{% extends "base.html" %}

{% block title %}Student Analytics{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-8">My Performance</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-500">
            <p class="text-gray-500 text-sm">Enrolled Courses</p>
            <p class="text-3xl font-bold text-gray-900">{{ data.enrolled_courses }}</p>
        </div>
        <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-green-500">
            <p class="text-gray-500 text-sm">Average Quiz Score</p>
            <p class="text-3xl font-bold text-gray-900">{{ data.average_quiz_score }}%</p>
        </div>
        <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-yellow-500">
            <p class="text-gray-500 text-sm">Completed Assignments</p>
            <p class="text-3xl font-bold text-gray-900">{{ data.completed_assignments }}</p>
        </div>
    </div>
</div>
{% endblock %}
